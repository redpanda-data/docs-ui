---
  name: publish-release

  on:
    push:
      tags: ['v*']

  jobs:
    build:
      runs-on: ubuntu-22.04
      permissions:
        contents: write

      env:
        ALGOLIA_API_KEY: ${{ secrets.ALGOLIA_API_KEY }}
        ALGOLIA_APP_ID: ${{ vars.ALGOLIA_APP_ID }}
        ALGOLIA_INDEX_NAME: ${{ vars.ALGOLIA_INDEX_NAME }}

      steps:
        - uses: actions/checkout@v4

        - name: Set up Go
          uses: actions/setup-go@v5
          with:
            go-version: stable
            cache-dependency-path: blobl-editor/wasm/go.sum

        - uses: actions/setup-node@v4
          with:
            node-version: 18

        - name: Cache node_modules
          id: cache-node-modules
          uses: actions/cache@v4
          with:
            path: node_modules
            key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

        - name: Install dependencies
          if: steps.cache-node-modules.outputs.cache-hit != 'true'
          run: npm ci

        - name: Cache generated files
          uses: actions/cache@v4
          with:
            path: src/static/blobl.wasm
            key: generated-${{ hashFiles('blobl-editor/wasm/go.sum') }}-${{ hashFiles('package-lock.json') }}
            restore-keys: |
              generated-${{ hashFiles('blobl-editor/wasm/go.sum') }}-
              generated-

        - run: gulp bundle
          timeout-minutes: 10

        - name: Create GitHub Release (prerelease aware)
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            TAG="${{ github.ref_name }}"
            ASSET=./build/ui-bundle.zip
            FLAGS="--generate-notes"
            if [[ "$TAG" =~ - ]]; then
              FLAGS+=" --prerelease"
            fi
            gh release create "$TAG" $ASSET $FLAGS

        - name: Trigger Netlify Build Hook
          run: curl -X POST -d '{}' https://api.netlify.com/build_hooks/64e4682992f9ec30865c7c0b
